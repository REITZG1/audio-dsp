[platformio]
description = Digital Audio Mixer for ESP32-P4
src_dir = .

[env:esp32-p4]
platform = espressif32
board = esp32-p4-devkit
framework = arduino

board_build.mcu = esp32p4
board_build.f_cpu = 400000000L
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM

lib_extra_dirs = libraries

lib_deps =
    bblanchon/ArduinoJson @ ^7.0

monitor_speed = 115200

[env:esp32-p4-debug]
platform = espressif32
board = esp32-p4-devkit
framework = arduino

board_build.mcu = esp32p4
board_build.f_cpu = 400000000L
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=4
    -DBOARD_HAS_PSRAM
    -DSERIAL_LOG=1

lib_extra_dirs = libraries

lib_deps =
    bblanchon/ArduinoJson @ ^7.0

monitor_speed = 115200
