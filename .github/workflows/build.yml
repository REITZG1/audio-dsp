name: Build Firmware

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-esp32 component
        run: |
          mkdir -p components
          git clone --depth 1 -b idf-release/v5.5 \
            https://github.com/espressif/arduino-esp32.git components/arduino

      - name: Install ArduinoJson component
        run: |
          git clone --depth 1 -b 7.x \
            https://github.com/bblanchon/ArduinoJson.git components/arduinojson

      - name: Build with idf.py
        run: |
          . /opt/esp/idf/export.sh
          idf.py set-target esp32p4
          idf.py build

      - name: Package firmware
        run: |
          . /opt/esp/idf/export.sh
          mkdir -p firmware/release
          cp build/audio_mixer_p4.bin firmware/release/
          cp build/bootloader/bootloader.bin firmware/release/ 2>/dev/null || true
          cp build/partition_table/partition-table.bin firmware/release/ 2>/dev/null || true
          esptool.py --chip esp32p4 merge_bin \
            --output firmware/release/audio_mixer_p4_merged.bin \
            --flash_mode qio --flash_size 16MB \
            0x0 firmware/release/bootloader.bin \
            0x8000 firmware/release/partition-table.bin \
            0x10000 firmware/release/audio_mixer_p4.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-p4-audio-mixer-firmware
          path: firmware/release/*.bin

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: esp32-p4-audio-mixer-firmware
          path: firmware/

      - uses: softprops/action-gh-release@v2
        with:
          files: firmware/*.bin
